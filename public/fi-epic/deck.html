<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quartermint — Epic Sprint Deck</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FFFFFF; --surface:#E6F4F1; --accent:#A8E6CF; --accent-deep:#7CCFB0;
  --ink:#333A45; --muted:#555555; --faint:#888888; --on-accent:#333A45;
  --display:'Instrument Serif',Georgia,serif; --body:'DM Sans',system-ui,sans-serif;
  --rail:360px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--body);color:var(--ink);background:#1A1D23;-webkit-font-smoothing:antialiased;overflow:hidden}

/* ---- App shell ---- */
#app{display:flex;height:100vh;width:100vw}
#stage{flex:1;display:flex;align-items:center;justify-content:center;padding:3vmin;position:relative;background:radial-gradient(circle at 50% 30%,#22262e,#16181d)}
#rail{width:var(--rail);flex-shrink:0;background:#0f1115;color:#cdd4dd;border-left:1px solid #2a2f38;display:flex;flex-direction:column;transition:margin-right .3s ease}
body.clean #rail{margin-right:calc(-1 * var(--rail))}
body.clean #stage{padding:0}

/* ---- Slide canvas: fixed 16:9 ---- */
#slide{background:var(--bg);width:min(100%,calc((100vh - 6vmin) * 1.6));aspect-ratio:16/9;border-radius:10px;box-shadow:0 24px 80px rgba(0,0,0,.5);overflow:hidden;position:relative;display:flex;flex-direction:column}
body.clean #slide{width:min(100vw,calc(100vh * 1.7778));height:100vh;border-radius:0;aspect-ratio:auto}

/* slide internal layout */
.s-pad{padding:5.5% 6% 5%;display:flex;flex-direction:column;height:100%}
.s-kicker{font-size:1.0vw;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--accent-deep)}
body.clean .s-kicker{font-size:1.05vh}
.s-title{font-family:var(--display);font-weight:400;font-size:3.0vw;line-height:1.08;color:var(--ink);margin:.35em 0 .15em}
body.clean .s-title{font-size:3.1vh}
.s-sub{font-family:var(--display);font-style:italic;font-size:1.55vw;line-height:1.3;color:var(--muted);margin-bottom:1em}
body.clean .s-sub{font-size:1.7vh}
.s-cols{display:flex;gap:5%;flex:1;min-height:0}
.s-col{flex:1;display:flex;flex-direction:column}
.col-label{font-size:.82vw;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);border-bottom:1px solid var(--accent);padding-bottom:.5em;margin-bottom:.8em}
body.clean .col-label{font-size:.95vh}
.s-list{list-style:none;display:flex;flex-direction:column;gap:.62em}
.s-list li{position:relative;padding-left:1.05em;font-size:1.04vw;line-height:1.4;color:var(--ink)}
body.clean .s-list li{font-size:1.15vh}
.s-list li::before{content:"▸";position:absolute;left:0;color:var(--accent-deep)}
.s-list li b{font-weight:600}
.s-list li .dim{color:var(--muted)}
.pull{border-left:3px solid var(--accent);padding:.2em 0 .2em 1em;font-family:var(--display);font-style:italic;font-size:1.35vw;line-height:1.32;color:var(--ink);margin-top:auto}
body.clean .pull{font-size:1.5vh}
.pull cite{display:block;font-family:var(--body);font-style:normal;font-size:.8vw;color:var(--faint);margin-top:.5em;letter-spacing:.04em}
body.clean .pull cite{font-size:.95vh}
.metric-row{display:flex;gap:6%;margin-top:.3em}
.metric{flex:1}
.metric .n{font-family:var(--display);font-size:2.6vw;line-height:1;color:var(--ink)}
body.clean .metric .n{font-size:2.9vh}
.metric .l{font-size:.78vw;color:var(--muted);margin-top:.3em;line-height:1.3}
body.clean .metric .l{font-size:.92vh}
.s-foot{position:absolute;bottom:2.5%;left:6%;right:6%;display:flex;justify-content:space-between;font-size:.72vw;color:var(--faint);letter-spacing:.04em}
body.clean .s-foot{font-size:.85vh}

/* cover */
.cover{justify-content:center;align-items:flex-start;background:linear-gradient(135deg,#fff 60%,var(--surface))}
.cover .mark{display:flex;gap:.6em;font-size:1.6vw;margin-bottom:1.2em;color:var(--accent-deep)}
.brand{font-family:var(--display);font-size:5.2vw;line-height:1;letter-spacing:.01em}
body.clean .brand{font-size:5.6vh}
.tagline{font-family:var(--display);font-style:italic;font-size:2.1vw;color:var(--muted);margin-top:.3em}
body.clean .tagline{font-size:2.3vh}

/* divider / curtain */
.divider{background:linear-gradient(135deg,#16181d,#22303a);color:#eef3f1;align-items:center;justify-content:center;text-align:center}
.divider .s-kicker{color:var(--accent)}
.divider h2{font-family:var(--display);font-size:4vw;line-height:1.1;margin:.3em 0;color:#fff}
body.clean .divider h2{font-size:4.2vh}
.divider p{font-family:var(--display);font-style:italic;font-size:1.7vw;color:#bfe9d8;max-width:70%}
body.clean .divider p{font-size:1.9vh}
.launch{display:flex;gap:3%;margin-top:2em;flex-wrap:wrap;justify-content:center}
.launch a{background:var(--accent);color:var(--on-accent);text-decoration:none;font-weight:600;font-size:1.0vw;padding:.7em 1.3em;border-radius:6px;transition:transform .15s}
body.clean .launch a{font-size:1.15vh}
.launch a:hover{transform:translateY(-2px)}
.fb-grid{display:grid;grid-template-columns:1fr 1fr;gap:.7em 4%;margin-top:.4em}
.fb-grid .fb{font-size:.92vw;line-height:1.35}
body.clean .fb-grid .fb{font-size:1.05vh}
.fb .o{color:var(--ink);font-weight:600}
.fb .a{color:var(--muted)}
.fb .a::before{content:"→ ";color:var(--accent-deep)}

/* ---- Speaker rail ---- */
.rail-head{padding:16px 18px;border-bottom:1px solid #2a2f38;display:flex;justify-content:space-between;align-items:center}
.rail-head .t{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#7f8a99}
.rail-head .time{font-family:var(--display);font-size:20px;color:var(--accent)}
.rail-body{padding:18px;overflow-y:auto;flex:1;font-size:16px;line-height:1.6}
.rail-body h4{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent-deep);margin:16px 0 6px}
.rail-body h4:first-child{margin-top:0}
.rail-body p{color:#cdd4dd;margin-bottom:8px}
.rail-body ul.tp{list-style:none;margin:0;padding:0}
.rail-body ul.tp li{position:relative;padding-left:15px;margin-bottom:6px;color:#aeb6c2;font-size:15px;line-height:1.45}
.rail-body ul.tp li::before{content:"▸";position:absolute;left:0;color:var(--accent-deep)}
.rail-body p.script{color:#eef2f6;font-size:17px;line-height:1.75;margin-bottom:8px}
.rail-body .src{color:#6b7480;font-size:11.5px;font-style:italic;line-height:1.45}
.rail-foot{padding:12px 18px;border-top:1px solid #2a2f38;display:flex;justify-content:space-between;align-items:center;font-size:12px;color:#7f8a99}
.rail-foot button{background:#1c2128;color:#cdd4dd;border:1px solid #2a2f38;border-radius:5px;padding:5px 10px;font-family:var(--body);font-size:12px;cursor:pointer}
.rail-foot button:hover{border-color:var(--accent)}

/* ---- nav controls ---- */
#nav{position:fixed;bottom:16px;left:16px;display:flex;gap:8px;align-items:center;z-index:20;background:rgba(15,17,21,.82);padding:7px 12px;border-radius:8px;color:#cdd4dd;font-size:13px;backdrop-filter:blur(6px)}
#nav button{background:transparent;border:1px solid #3a414c;color:#cdd4dd;border-radius:5px;width:30px;height:30px;cursor:pointer;font-size:15px}
#nav button:hover{border-color:var(--accent);color:#fff}
#nav .count{font-variant-numeric:tabular-nums;min-width:54px;text-align:center}
.hint{position:fixed;bottom:16px;right:16px;z-index:20;font-size:11px;color:#6b7280;background:rgba(15,17,21,.7);padding:6px 10px;border-radius:6px}
.talk-banner{position:absolute;top:10px;right:6%;font-size:.72vw;color:var(--faint);font-style:italic}
body.clean .talk-banner{display:none}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<div id="app">
  <div id="stage"><div id="slide"></div>
    <div id="nav">
      <button onclick="prev()" aria-label="Previous">‹</button>
      <span class="count" id="count">1 / 8</span>
      <button onclick="next()" aria-label="Next">›</button>
    </div>
    <div class="hint">← → navigate · <b>C</b> clean mode · <b>F</b> fullscreen · <b>S</b> notes</div>
  </div>
  <div id="rail">
    <div class="rail-head"><span class="t">Presenter rail</span><span class="time" id="rtime">—</span></div>
    <div class="rail-body" id="rbody"></div>
    <div class="rail-foot"><span id="rpos">—</span><button onclick="toggleClean()">Projector mode ⌨C</button></div>
  </div>
</div>
<script>
/* ===========================================================================

   Every claim is sourced (see EVIDENCE.md). No em dashes in slide copy.
   =========================================================================== */
const SLIDES = [
{
  type:'cover',
  count:'1 / 8',
  left:'Cover + Tagline', right:'Traction',
  render:`<div class="s-pad cover">
    <div class="mark">● ◆ ▲ ■</div>

    script:`Quartermint is treasury and compliance software for political organizations. I want to start with proof, not a pitch. It is live in production right now, running a real one-and-a-half-million-dollar independent-expenditure campaign. We have carried four real filings through it this quarter: one quarterly report and three forty-eight-hour reports. And the one error we ran into was not ours. It was a bug in the state's own filing system, which we caught and reported.`,
    source:`Live production usage: state PAC, $1.5M IE campaign. 4 filings (1 quarterly + 3x 48-hr). Bug-catch: MD SBE confirmed (voice memos 5/26-5/27, Granola MD SBE call).`
  }
},
{
  left:'Hook', right:'GTM',
  count:'2 / 8',
  render:`<div class="s-pad">
    <div class="s-kicker">Hook &nbsp;·&nbsp; Go-to-market</div>
    <div class="s-title">Every political org rebuilds the same broken stack. We replace it one operator at a time.</div>
    <div class="s-cols">
      <div class="s-col"><div class="col-label">The hook</div>

          <li>Bank portal. Call-time manager. Donor enrichment. Windows 95-era regulatory filing data entry software.</li>

  </div>`,
  time:'0:50',
  notes:{
    points:[`The whole product in one sentence`,`One overworked operator is the only thing connecting the stack`,`Operation -> firm's book -> bank bundles -> staff insist on it`],
    script:`Every political organization rebuilds the same financial stack from scratch. A bank portal, a call-time manager, a donor-enrichment tool, and a Windows-95-era filing system, with an overworked operator holding it all together at midnight before a deadline. Here is the whole product in one sentence: you raise a dollar, you spend a dollar, and the dollar gets reported. The way we grow is simple. I do not sell a dashboard cold. I take over one operation's real filings this cycle. Their compliance firm sees it work and adopts it across their entire client book. The industry-dominant bank bundles it for the committees it already holds. And the staff insist on using it, even to decision-makers who are indifferent to which tool it is. One operation, then a whole book, then a channel.`,
    source:`"You raise a dollar, you spend a dollar, the dollar gets reported": Ryan's one-liner (reordered 2026-06-01; origin voice memo 20260330 201330:120). Operator-led GTM (land one operation -> compliance firm adopts across client book -> bank bundles): Ryan 2026-06-01 + 20260530 121804. Broken-stack framing: prior MIR deck slide 3.`
  }
},
{
  left:'Problem', right:'Partnerships',
  count:'3 / 8',
  render:`<div class="s-pad">
    <div class="s-kicker">Problem &nbsp;·&nbsp; Partnerships</div>
    <div class="s-title">The information needed to stay legal is scattered across systems that were never built to talk.</div>
    <div class="s-cols">

  time:'0:55',
  notes:{
    points:[`Each tool owns its silo poorly and they don't connect`,`A PAC chair said it best, in his own words`,`Not cold: live committees as clients, plus the bank and firms who pick the stack`],
    script:`The information you need to stay legal is scattered across systems that were never built to talk to each other. The bank moves money but strips the detail a filing needs. QuickBooks is too much tool, and none of it is built for what this industry actually needs. The filing tools each own their own silo, poorly, and do not connect to each other. A PAC chair put it to me better than I could: how do I get an email every time someone deposits money into our account. That one line is the product. On partnerships, I am not pitching cold. Live committees already run on Quartermint as my consulting clients, and I have standing relationships with the partners who pick the stack, the deposit bank and the compliance firms. The dominant progressive deposit bank told me to my face that their own frontend is the gap, and they asked what I would build. One of their own customers already runs on Quartermint. Their ask was to bring a real engineering team, and that is exactly what I am raising for.`,
    source:`PAC-chair quote: prior MIR deck slide 3 verbatim. Wire/ACH metadata gap: JR working session (voice memo 5/13). Bank = Amalgamated; "go get a real engineering team": mentor call. Partnerships reframed per Ryan 2026-06-01: lead with existing committees as consulting clients + standing distribution relationships (deposit bank + compliance firms), drop "warm signal not a signed deal." NB: Amalgamated has NOT seen the demo yet; it goes to senior leadership coupled with the YC update once the surface hits the quality bar. The bank's frontend-is-the-gap line is from the Dec 2025 lunch, not a product review.`

{
  left:'Solution', right:'Competition',
  count:'4 / 8',
  render:`<div class="s-pad">
    <div class="s-kicker">Solution &nbsp;·&nbsp; The landscape</div>

    <div class="s-title">One login, every subentity, every tool. End to end: dollar in, dollar spent, dollar reported.</div>
    <div class="s-cols">
      <div class="s-col"><div class="col-label">The solution</div>
        <ul class="s-list">

    <div class="s-foot"><span>QUARTERMINT</span><span>FI EPIC SPRINT · 2026</span></div>
  </div>`,

    points:[`One login, every entity, filing baked in`,`Filing tools exist; all are fundraising-first`,`We are the only treasury-first, bank-distributed one`],
    script:`The solution is one login across every subentity and every tool, end to end, from the dollar coming in to the dollar spent to the dollar reported. It sits on top of the bank, gives you inbound alerts and real-time balances, reconciles across affiliated entities, and runs the FEC, fifty-state, and IRS rules for you. I want to be honest about the landscape, because there are real tools here. The incumbents file. But every one of them is a fundraising CRM with compliance bolted on. None of them starts at the bank the way we do, and none of them comes through the two channels that actually decide what a committee uses: the deposit bank, and the operator who picks the stack. That is the lane no one is in.`,
    source:`Competitive scan (Jun 1) + Lora confirmation: ISPolitical, NGP/Bonterra, Campaign Deputy all file; all fundraising-CRM-first; none bank-distributed or treasury-first. Anonymized per voice rule. Replaces the earlier (incorrect) "no real competitor / banks won't build it" framing.`

},
{
  left:'Product', right:'Team',
  count:'5 / 8',
  render:`<div class="s-pad">
    <div class="s-kicker">Product &nbsp;·&nbsp; Team</div>

      <div class="s-col"><div class="col-label">Team</div>
        <ul class="s-list">
          <li>A career inside political operations.</li>
          <li>Shaped by the operators using it, not a roadmap.</li>

        </ul>
      </div>
    </div>
    <div class="s-foot"><span>QUARTERMINT</span><span>FI EPIC SPRINT · 2026</span></div>
  </div>`,
  time:'1:10',
  notes:{
    script:`Here's how it works in the wild, in four steps. Money lands, and the operator gets an alert. The system enriches it: it reads the check and looks up the missing donor address against state registries, all on the operator's own machine, so the data never leaves. It reconciles against their own records and flags the real mismatches. Then it drafts the filing record by record, so a human reviews and signs. Here is why anyone switches: today that one filing is thirty to forty hours across three tools that each do one piece and won't touch the others, plus a handoff to a specialist. We collapse it to minutes. When a design partner saw her own thirty-hour filing become minutes, that was the moment she got it. On the team: I have spent my career inside political operations, and this was shaped by the operators running real filings, not by a roadmap. And I want to be honest about what team means here. This is not one person in a vacuum. The people using it are the people shaping it. Customers become design partners, and design partners become teammates, and those lines are fluid on purpose. In an industry this interwoven, that is not a gap in the team, it is the moat. The honest gap I am still closing is making it run without me.`,
    points:[`Walk the four steps as one real flow`,`Why switch: 30+ hours becomes minutes`,`A human always signs the actual filing`,`The collective is the moat: customers become teammates`],
    source:`4-step flow: JR live screen-share (voice memo 5/13) - check vs wire metadata, on-device OCR/registry lookup, auto-reconciliation flagging Bernstein/Southern Mgmt. Human-gated submit: YC update. Founder-market fit, no year-counts: voice rule. Collective-as-moat framing: Ryan articulation 2026-06-01, grounded in PAC chair self-serve demand + compliance partner prototyping (the people using it shaping it).`
  }
},

  render:`<div class="s-pad">

    script:`The market, bottoms-up: about eight thousand FEC committees, twelve thousand state and local PACs, and five thousand advocacy entities. That is twenty-five thousand organizations, before 2028 expands the count. One honest distinction on revenue: a campaign is run-rate, so it ends on election day. The recurring revenue starts when they win, because an incumbent keeps a reelection committee, a joint-fundraising committee, and a leadership PAC, and the more complex they get the more they pay. With a ninety-nine percent incumbency rate, the winners compound. At roughly sixteen percent penetration, that is a fifty-million-dollar path, and that is an estimate, not a promise. On advisors, I am building the bench deliberately, and converting design partners into formal advisors this quarter.`,

{
  left:'Why Now', right:'Ask',
  count:'7 / 8',
  render:`<div class="s-pad">

let i = 0;
const slideEl = document.getElementById('slide');
const countEl = document.getElementById('count');
const rbody = document.getElementById('rbody');
const rtime = document.getElementById('rtime');
const rpos = document.getElementById('rpos');

function draw(){
  const s = SLIDES[i];
  slideEl.innerHTML = s.render;
  countEl.textContent = s.count;
  rtime.textContent = s.time || '—';
  rpos.textContent = (s.left||'') + (s.right? '  ·  '+s.right : '');
  const pts = (s.notes.points||[]).map(p=>`<li>${p}</li>`).join('');
  rbody.innerHTML =
    `<h4>Talking points</h4><ul class="tp">${pts}</ul>`+
    `<h4>Speaker notes</h4><p class="script">${s.notes.script}</p>`;
  rbody.scrollTop = 0;
}
function next(){ if(i<SLIDES.length-1){i++;draw();} }
function prev(){ if(i>0){i--;draw();} }
function toggleClean(){ document.body.classList.toggle('clean'); }
function toggleFs(){ if(!document.fullscreenElement){document.documentElement.requestFullscreen&&document.documentElement.requestFullscreen();}else{document.exitFullscreen&&document.exitFullscreen();} }
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='PageDown'||e.key===' '){next();e.preventDefault();}
  else if(e.key==='ArrowLeft'||e.key==='PageUp'){prev();}
  else if(e.key.toLowerCase()==='c'){toggleClean();}
  else if(e.key.toLowerCase()==='f'){toggleFs();}
  else if(e.key.toLowerCase()==='s'){document.getElementById('rail').classList.toggle('hidden');toggleClean();}
  else if(e.key==='Home'){i=0;draw();}
  else if(e.key==='End'){i=SLIDES.length-1;draw();}
});
draw();
</script>
